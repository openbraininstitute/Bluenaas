name: Pre-merge Review

on: [pull_request]

permissions:
  id-token: write
  contents: read

jobs:
  pull-request-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"
          enable-cache: true

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Configure AWS credentials (CodeArtifact)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::985539765147:role/gh_codeartifact_read_all
          aws-region: us-east-1

      - name: Get CodeArtifact token
        run: |
          TOKEN=$(aws codeartifact get-authorization-token --domain openbraininstitute --query authorizationToken --output text)
          echo "CODEARTIFACT_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Check requirements
        run: make check-deps

      - name: Configure git and install requirements
        env:
          GH_PRIVATE_REPO_TOKEN: ${{ secrets.GH_PRIVATE_REPO_TOKEN }}
          UV_INDEX_CODEARTIFACT_USERNAME: aws
          UV_INDEX_CODEARTIFACT_PASSWORD: ${{ env.CODEARTIFACT_TOKEN }}
        run: |
          git config --global url."https://$GH_PRIVATE_REPO_TOKEN@github.com/".insteadOf "https://github.com/"
          make install

      - name: Run checks
        run: make check-all
